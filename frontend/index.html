<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Terminal</title>
    <link rel="stylesheet" href="/static/css/terminal.css?v=2">
</head>
<body>
    <div id="app">
        <header id="header">
            <div class="header-left">
                <h1>MARKET TERMINAL</h1>
            </div>
            <div class="header-center" id="market-ticker-bar"></div>
            <div class="header-right">
                <a href="/calibration" class="nav-link">CALIBRATION</a>
                <span id="connection-status" class="status-dot disconnected"></span>
                <span id="clock"></span>
            </div>
        </header>
        <div id="main-layout">
            <aside id="sidebar">
                <div class="filter-section">
                    <h3>Categories</h3>
                    <div id="category-filters"></div>
                </div>
                <div class="filter-section">
                    <h3>Ticker Search</h3>
                    <input type="text" id="ticker-search" placeholder="e.g. AAPL, CL, SPY">
                </div>
                <div class="filter-section">
                    <h3>Impact</h3>
                    <div id="impact-filters"></div>
                </div>
                <div class="filter-section">
                    <h3>Sources</h3>
                    <div id="source-filters"></div>
                </div>
            </aside>
            <main id="feed-container">
                <div id="feed"></div>
            </main>
        </div>
        <footer id="footer">
            <span id="status-text">Connecting...</span>
            <span id="stats-text">Headlines today: 0 | Analyzed: 0</span>
        </footer>
    </div>
    <script src="/static/js/websocket.js?v=2"></script>
    <script src="/static/js/feed.js?v=2"></script>
    <script src="/static/js/filters.js?v=2"></script>
    <script src="/static/js/app.js?v=2"></script>
</body>
</html>
